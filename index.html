<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alma Serena - Astrología y Bienestar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cosmico: #1a1235;
            --lavanda: #b7a1d3;
            --oro: #cbd29a;
            --crema: #f9f7f1;
            --oscuro: #2c2541;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Jost', sans-serif; background-color: var(--crema); color: var(--cosmico); overflow-x: hidden; padding-bottom: 60px; }
        header { background: var(--cosmico); padding: 20px; text-align: center; color: white; position: relative; }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; }
        .logo { font-size: 32px; font-weight: bold; letter-spacing: 2px; color: var(--crema); }
        .nav-links { margin-top: 15px; display: flex; justify-content: center; gap: 20px; }
        .nav-links a { color: var(--lavanda); text-decoration: none; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-admin { position: absolute; top: 20px; right: 20px; background: transparent; border: 1px solid var(--lavanda); color: var(--lavanda); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        
        .hero { padding: 80px 20px; text-align: center; background: linear-gradient(to bottom, var(--cosmico), var(--oscuro)); color: white; }
        .hero h2 { font-size: 45px; margin-bottom: 15px; color: var(--oro); }
        .hero p { max-width: 600px; margin: 0 auto 25px; font-size: 18px; color: var(--crema); opacity: 0.9; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .section-title { text-align: center; font-size: 36px; margin-bottom: 20px; position: relative; padding-bottom: 10px; }
        .section-title::after { content: ''; width: 60px; height: 2px; background: var(--oro); position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 30px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.03); display: flex; flex-direction: column; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); }
        .card-img { height: 200px; background-size: cover; background-position: center; position: relative; background-color: #e0e0e0; }
        .card-content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-tag { font-size: 11px; text-transform: uppercase; color: var(--lavanda); font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; }
        .card-title { font-size: 24px; margin-bottom: 10px; }
        .card-desc { font-size: 15px; color: #666; margin-bottom: 20px; line-height: 1.6; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; border-top: 1px solid #eee; padding-top: 15px; }
        .price { font-size: 22px; font-weight: bold; color: var(--cosmico); }
        .btn-buy { background: var(--cosmico); color: white; padding: 8px 18px; border-radius: 20px; text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.3s; text-align: center; }
        
        /* Controles de Edición */
        .edit-field { display: none; width: 100%; margin-top: 5px; padding: 6px; border: 1px solid var(--lavanda); border-radius: 4px; font-family: sans-serif; font-size: 13px; }
        .edit-img-btn { display: none; position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; border: none; padding: 5px 10px; font-size: 11px; border-radius: 4px; cursor: pointer; z-index: 10; }
        .btn-eliminar { display: none; position: absolute; top: 10px; right: 10px; background: #ff4d4d; color: white; border: none; padding: 5px 10px; font-size: 11px; border-radius: 4px; cursor: pointer; z-index: 10; font-weight: bold; }
        
        .area-agregar { text-align: center; margin: 20px 0 40px; display: none; }
        .btn-agregar { background: #27ae60; color: white; border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-agregar:hover { background: #219653; transform: scale(1.05); }

        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background-color: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; text-align: center; font-size: 30px; box-shadow: 2px 2px 10px rgba(0,0,0,0.3); z-index: 100; display: flex; align-items: center; justify-content: center; text-decoration: none; }

        #admin-panel { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--cosmico); color: white; padding: 15px; text-align: center; z-index: 1000; }
        #admin-panel button { background: var(--oro); border: none; color: var(--cosmico); padding: 8px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-left: 15px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">ALMA SERENA</div>
        <div class="nav-links">
            <a href="#productos-seccion">Mis Productos y Formaciones</a>
        </div>
        <button class="btn-admin" onclick="ingresarAdmin()">🔑 Editar Web</button>
    </header>

    <section class="hero">
        <h2 id="hero-title">Tu Espacio de Transformación Cósmica</h2>
        <p id="hero-subtitle">Descubre formaciones, rituales guiados y herramientas energéticas para conectar con tu sabiduría interior.</p>
    </section>

    <section id="productos-seccion" class="container">
        <h2 class="section-title">Catálogo Completo de Alquimia</h2>
        
        <div class="area-agregar" id="area-agregar-btn">
            <button class="btn-agregar" onclick="crearNuevoProducto()">➕ Agregar Nuevo Producto / Curso</button>
        </div>

        <div class="grid" id="contenedor-productos">
            <!-- Los productos se cargarán dinámicamente aquí -->
        </div>
    </section>

    <div id="admin-panel">
        <span>🛠️ Modo Editor Activo. ¡Crea, edita o elimina productos directamente!</span>
        <button onclick="guardarCambios()">💾 Guardar Todo</button>
    </div>

    <a href="https://wa.me/5493425683418?text=Hola!%20Me%20gustaría%20obtener%20más%20información." class="whatsapp-float" target="_blank">
        <svg style="width:30px;height:30px;fill:white;vertical-align:middle" viewBox="0 0 24 24"><path d="M12.012 2c-5.506 0-9.989 4.478-9.99 9.984a9.96 9.96 0 0 0 1.333 4.993L2 22l5.135-1.347a9.94 9.94 0 0 0 4.873 1.277h.005c5.505 0 9.99-4.478 9.99-9.985 0-2.667-1.037-5.176-2.922-7.062A9.923 9.923 0 0 0 12.012 2zm5.726 14.12c-.25.704-1.235 1.293-1.705 1.342-.435.044-.997.058-2.647-.624a10.96 10.96 0 0 1-4.577-4.043c-.615-.818-1.041-1.802-1.041-2.825 0-1.268.665-1.892.903-2.14.238-.248.53-.31.704-.31a.417.417 0 0 1 .403.242c.174.417.585 1.433.636 1.539.05.105.084.23.013.37-.07.14-.146.242-.258.373-.112.13-.234.29-.334.39-.11.11-.227.23-.098.452a8.04 8.04 0 0 0 1.5 1.861 7.3 7.3 0 0 0 2.164 1.332c.22.11.35.093.479-.056.128-.15.556-.648.704-.87.147-.22.296-.184.5-.11.204.075 1.298.613 1.52.724.223.111.372.167.428.263.056.096.056.554-.194 1.258z"/></svg>
    </a>

    <script>
        let esAdmin = false;
        
        let productos = [
            { id: "p1", tag: "Astrología", titulo: "Formación en Astrología", desc: "Un viaje completo desde los conceptos básicos hasta la interpretación avanzada.", precio: "$97 USD", link: "https://hotmart.com", img: "https://images.unsplash.com/photo-1515942400420-2b98fed1f515?w=500" },
            { id: "p2", tag: "Ritual", titulo: "Ritual de Luna Llena", desc: "Guía paso a paso para encender tu poder interior y manifestar intenciones.", precio: "¡Gratis!", link: "https://youtube.com", img: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=500" }
        ];

        window.onload = function() {
            if(localStorage.getItem('almaSerena_lista_productos')) {
                productos = JSON.parse(localStorage.getItem('almaSerena_lista_productos'));
            }
            renderizarProductos();
        };

        function renderizarProductos() {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = '';
            
            productos.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img" style="background-image: url('${p.img}')">
                        <button class="edit-img-btn" style="display: ${esAdmin ? 'block' : 'none'}" onclick="cambiarImagen(${index})">🖼️ Cambiar Foto</button>
                        <button class="btn-eliminar" style="display: ${esAdmin ? 'block' : 'none'}" onclick="eliminarProducto(${index})">❌ Eliminar</button>
                    </div>
                    <div class="card-content">
                        <span class="card-tag">${p.tag}</span>
                        <h3 class="card-title">${p.titulo}</h3>
                        <input type="text" class="edit-field" style="display: ${esAdmin ? 'block' : 'none'}" value="${p.titulo}" oninput="actualizarFaux(${index}, 'titulo', this.value)">
                        
                        <p class="card-desc">${p.desc}</p>
                        <textarea class="edit-field" style="display: ${esAdmin ? 'block' : 'none'}" oninput="actualizarFaux(${index}, 'desc', this.value)">${p.desc}</textarea>
                        
                        <div class="card-footer">
                            <div>
                                <span class="price">${p.precio}</span>
                                <input type="text" class="edit-field" style="display: ${esAdmin ? 'block' : 'none'}" value="${p.precio}" oninput="actualizarFaux(${index}, 'precio', this.value)">
                            </div>
                            <a href="${p.link}" target="_blank" class="btn-buy">Ver Más</a>
                            <input type="text" class="edit-field" style="display: ${esAdmin ? 'block' : 'none'}" placeholder="Link de Hotmart/Video" value="${p.link}" oninput="actualizarFaux(${index}, 'link', this.value)">
                        </div>
                    </div>
                `;
                contenedor.appendChild(card);
            });
        }

        function actualizarFaux(index, campo, valor) {
            productos[index][campo] = valor;
        }

        function ingresarAdmin() {
            const pass = prompt("Ingresa tu contraseña de administradora:");
            if(pass === "AlquimiaS4rena2026!") {
                esAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('area-agregar-btn').style.display = 'block';
                renderizarProductos();
                alert("¡Modo edición activo! Ahora podés agregar más productos con el botón verde.");
            } else {
                alert("Contraseña incorrecta.");
            }
        }

        function crearNuevoProducto() {
            const nuevo = {
                id: "p_" + Date.now(),
                tag: "Nuevo",
                titulo: "Título del Producto Nuevo",
                desc: "Hacé clic en editar para cambiar esta descripción corta.",
                precio: "$0 USD",
                link: "#",
                img: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=500"
            };
            productos.push(nuevo);
            renderizarProductos();
        }

        function eliminarProducto(index) {
            if(confirm("¿Segura que querés eliminar este producto?")) {
                productos.splice(index, 1);
                renderizarProductos();
            }
        }

        function cambiarImagen(index) {
            const url = prompt("Pegá el enlace de la imagen:");
            if(url) {
                productos[index].img = url;
                renderizarProductos();
            }
        }

        function guardarCambios() {
            localStorage.setItem('almaSerena_lista_productos', JSON.stringify(productos));
            esAdmin = false;
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('area-agregar-btn').style.display = 'none';
            renderizarProductos();
            alert("¡Todos tus productos han sido guardados con éxito!");
        }
    </script>
</body>
</html>
